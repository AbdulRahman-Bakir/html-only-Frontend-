<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
  </head>
  <body>
    <header>
      <p>Acme Support</p>
      <nav>
        <ul>
          <li>Home</li>
          <li>Help</li>
          <li>Contact</li>
        </ul>
      </nav>
      <hr />
    </header>
    <main>
      <form action="https://www.example.com" method="post">
        <h1>Contact us</h1>
        <label for="fullname">Full name</label>
        <input type="text" id="fullname" name="fullname" required />
        <br />
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
        <br />
        <label for="subject">Subject</label>
        <select name="subject" id="subject">
          <option value="" disabled selected>Pick a topic</option>
          <option value="v1">Value 1</option>
          <option value="v2">Value 2</option>
          <option value="v3">Value 3</option>
        </select>
        <br />
        <label for="message"> Message </label>
        <textarea name="message" id="message" minlength="3" required></textarea>
        <br />
        <fieldset>
          <legend>How did you hear about us?</legend>
          <input type="radio" id="src-search" name="source" value="search" />
          <label for="src-search">Search</label>
          <br />
          <input type="radio" id="src-friend" name="source" value="friend" />
          <label for="src-friend">Friend</label>
          <br />
          <input
            type="radio"
            id="src-social-media"
            name="source"
            value="social-media"
          />
          <label for="src-social-media">Social Media</label>
        </fieldset>
        <input type="checkbox" name="newsletter" id="newsletter" />
        <label for="newsletter">Send me product updates</label>
        <br />
        <input type="submit" id="submit" value="Send message" />
      </form>
    </main>
    <hr />
    <footer>
      <p>&copy; 2026 Acme Support</p>
    </footer>
  </body>
</html>
