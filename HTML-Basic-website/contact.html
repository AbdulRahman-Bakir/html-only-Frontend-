<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="Css/contact.css" />
  </head>
  <body>
    <header>
      <h1>Contact Me</h1>
      <p>Have questions or want to collaborate? Get in touc!</p>
    </header>
    <section>
      <div class="title">
        <h2>Get in Touch</h2>
      </div>
      <div class="form">
        <form action="homepage.html" method="post">
          <label for="name">Name</label><br><br>
          <input type="text" placeholder="Your Name" id="name" />
          <br />
          <label for="email">Email</label><br><br>
          <input type="email" placeholder="Your Email" id="email" />
          <br />
          <label for="email">Message</label><br><br>
          <textarea
            name="message"
            id="message"
            placeholder="Enter your message"
          ></textarea>
          <br />
          <input type="submit" value="Send Message" class="submit" />
        </form>
      </div>
    </section>
    <section class="contact">
      <h2>Other Ways To Reach Me</h2>
      <address>
        <strong>Email:</strong>
        <a href="mailto:">no-reply@gmail.com</a>
        <br />  <br>
        <strong>Phone:</strong>
        "123-456-7890"
        <br><br>
        <strong>Address:</strong>
        "123 Your Street, Your City, ST 12345"
        <br><br>
        <strong>LinkedIn:</strong>
        <a href="https://www.linkedin.com/in/yourprofile">my Linked In</a>
        <br><br>
        <strong>Github:</strong>
        <a href="https://www.github.com">Github</a>
      </address>
    </section>
    <footer>
      <div class="text">
        <p>&copy; 2025 Your Name. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
